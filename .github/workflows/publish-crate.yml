# Publishes the crate to crates.io when a v* tag is pushed.
# NEXT STEP: add the CARGO_REGISTRY_TOKEN secret, then push a tag.
name: Publish crate

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify before publishing
        run: cargo test --workspace --all-features
      - name: Dry run
        run: cargo publish -p argenv --dry-run
      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo publish -p argenv
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
