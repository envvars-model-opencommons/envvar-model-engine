name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      # --all-targets so tests and examples are linted too: a lint that only
      # fires in a test target is still a lint.
      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

      # The suite covers the model's rules, reading, linting, the wire document,
      # the emitted schema, the command-line tool, and that the artefacts
      # committed to this repository are the ones the current model produces.
      - name: Test
        run: cargo test --workspace --all-features

      - name: Docs (warnings are errors)
        run: cargo doc --no-deps -p argenv --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: minimum supported Rust version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.75.0
      - run: cargo build --workspace --all-features

  conformance:
    name: independent schema conformance
    runs-on: ubuntu-latest
    # `cargo test` asserts what the schema *claims*. This job asserts what a
    # foreign JSON Schema engine *does* with it, so the schema is not marked by
    # the code that produced it.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Regenerate the example document
        run: cargo run -p argenv --example consumer > /tmp/example.json

      - name: Validate with a third-party engine
        run: |
          python3 -m pip install --quiet jsonschema
          python3 dev/conformance.py /tmp/example.json api/v1/example.json
