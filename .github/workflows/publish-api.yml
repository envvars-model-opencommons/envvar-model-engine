# Serves api/ as the contract GET API via GitHub Pages.
# NEXT STEP: enable Pages (Settings -> Pages -> Source: GitHub Actions).
name: Publish contract API

on:
  push:
    branches: [main]
    paths: ["api/**", "schema/**", ".github/workflows/publish-api.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: api
      - id: deployment
        uses: actions/deploy-pages@v4
