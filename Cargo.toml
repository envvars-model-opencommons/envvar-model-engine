[package]
name = "proton-env-model"
version = "0.1.0"
edition = "2021"
description = "The standard, typed env-var contract for the Proton stack. Rust is canonical; the JSON-Schema contract is generated from it."
license = "MIT OR Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# The generated cross-language contract (the 'swagger') is emitted via schemars,
# behind a feature so the core stays lightweight for pure consumers.
schemars = { version = "0.8", optional = true }

[features]
# `--features contract` enables `contract_schema()` -> the JSON-Schema all
# non-Rust bindings validate against. Kept optional so gamesteam etc. don't pull it.
contract = ["dep:schemars"]
